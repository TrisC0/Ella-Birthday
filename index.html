<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1b30" />
<title>Ella's Birthday Ride — Cadet Enduro!</title>
<meta name="description" content="A polished one-tap pixel-art mobile birthday game for Ella's 15th: ride the enduro trail, dodge obstacles and collect cadet badges, cake, music notes and her hamster." />
<style>
  :root { --teal:#3de0c0; --lime:#9bff5a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background:#070d1a; overflow:hidden;
    font-family: ui-monospace, "Courier New", monospace;
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  #game {
    display:block;
    image-rendering:pixelated; image-rendering:crisp-edges;
    background:#0b1b30; touch-action:none;
  }
  #ui {
    position:fixed; z-index:5; display:flex; gap:6px;
    top:calc(env(safe-area-inset-top,0px) + 6px);
    right:calc(env(safe-area-inset-right,0px) + 6px);
  }
  #ui button {
    width:36px; height:36px; padding:0; font-size:18px; line-height:36px;
    color:#cfe8ff; background:rgba(8,20,30,.55);
    border:1px solid rgba(61,224,192,.5); border-radius:9px;
    backdrop-filter:blur(2px); cursor:pointer;
  }
  #ui button:active { transform:translateY(1px); }
  #rotate {
    position:fixed; left:0; right:0; z-index:4; display:none;
    bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
    color:#bdf3ff; pointer-events:none; text-align:center;
    font-size:13px; line-height:1.5; padding:6px; text-shadow:0 1px 2px #000;
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <button id="muteBtn" aria-label="Mute">🔊</button>
    <button id="pauseBtn" aria-label="Pause">⏸</button>
  </div>
  <div id="rotate">📱 Turn your phone sideways (landscape) for the best ride! 🚵</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const muteBtn = document.getElementById("muteBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const rotateEl = document.getElementById("rotate");

  /* ===================== sizing (fit / letterbox) ===================== */
  let W = 384, H = 200;
  function resize() {
    const vw = window.innerWidth, vh = window.innerHeight;
    H = 200;
    const portrait = vh > vw;
    if (portrait) { W = 384; rotateEl.style.display = "block"; }
    else { W = Math.max(320, Math.min(560, Math.round(H * (vw / vh)))); rotateEl.style.display = "none"; }
    canvas.width = W; canvas.height = H;
    ctx.imageSmoothingEnabled = false;
    const aspect = W / H; let cw = vw, ch = vh;
    if (cw / ch > aspect) cw = Math.round(ch * aspect); else ch = Math.round(cw / aspect);
    canvas.style.width = cw + "px"; canvas.style.height = ch + "px";
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 120));
  resize();

  /* ===================== pixel helpers ===================== */
  const px=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x|0,y|0,1,1);};
  const rect=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);};
  function frect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);} // float (for transforms)
  function line(x0,y0,x1,y1,c){x0|=0;y0|=0;x1|=0;y1|=0;let dx=Math.abs(x1-x0),dy=-Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,e=dx+dy;while(1){px(x0,y0,c);if(x0===x1&&y0===y1)break;let e2=2*e;if(e2>=dy){e+=dy;x0+=sx;}if(e2<=dx){e+=dx;y0+=sy;}}}
  const thickLine=(a,b,c,d,col)=>{line(a,b,c,d,col);line(a,b+1,c,d+1,col);};
  function circleFill(cx,cy,r,c){for(let y=-r;y<=r;y++)for(let x=-r;x<=r;x++)if(x*x+y*y<=r*r+1)px(cx+x,cy+y,c);}
  function ring(cx,cy,r,c){let x=r,y=0,e=1-r;while(x>=y){[[x,y],[y,x],[-x,y],[-y,x],[-x,-y],[-y,-x],[x,-y],[y,-x]].forEach(p=>px(cx+p[0],cy+p[1],c));y++;if(e<0)e+=2*y+1;else{x--;e+=2*(y-x)+1;}}}
  function sprite(rows,pal,ox,oy,sc=1){for(let r=0;r<rows.length;r++){const row=rows[r];for(let i=0;i<row.length;i++){const c=pal[row[i]];if(c)rect(ox+i*sc,oy+r*sc,sc,sc,c);}}}

  /* ===================== 5x7 font ===================== */
  const FONT={A:["01110","10001","10001","11111","10001","10001","10001"],B:["11110","10001","10001","11110","10001","10001","11110"],C:["01111","10000","10000","10000","10000","10000","01111"],D:["11110","10001","10001","10001","10001","10001","11110"],E:["11111","10000","10000","11110","10000","10000","11111"],F:["11111","10000","10000","11110","10000","10000","10000"],G:["01111","10000","10000","10111","10001","10001","01111"],H:["10001","10001","10001","11111","10001","10001","10001"],I:["11111","00100","00100","00100","00100","00100","11111"],J:["00111","00010","00010","00010","10010","10010","01100"],K:["10001","10010","10100","11000","10100","10010","10001"],L:["10000","10000","10000","10000","10000","10000","11111"],M:["10001","11011","10101","10101","10001","10001","10001"],N:["10001","11001","10101","10101","10011","10001","10001"],O:["01110","10001","10001","10001","10001","10001","01110"],P:["11110","10001","10001","11110","10000","10000","10000"],Q:["01110","10001","10001","10001","10101","10010","01101"],R:["11110","10001","10001","11110","10100","10010","10001"],S:["01111","10000","10000","01110","00001","00001","11110"],T:["11111","00100","00100","00100","00100","00100","00100"],U:["10001","10001","10001","10001","10001","10001","01110"],V:["10001","10001","10001","10001","10001","01010","00100"],W:["10001","10001","10001","10101","10101","11011","10001"],X:["10001","10001","01010","00100","01010","10001","10001"],Y:["10001","10001","01010","00100","00100","00100","00100"],Z:["11111","00001","00010","00100","01000","10000","11111"],"0":["01110","10001","10011","10101","11001","10001","01110"],"1":["00100","01100","00100","00100","00100","00100","01110"],"2":["01110","10001","00001","00110","01000","10000","11111"],"3":["11110","00001","00001","01110","00001","00001","11110"],"4":["00010","00110","01010","10010","11111","00010","00010"],"5":["11111","10000","11110","00001","00001","10001","01110"],"6":["01110","10000","10000","11110","10001","10001","01110"],"7":["11111","00001","00010","00100","01000","01000","01000"],"8":["01110","10001","10001","01110","10001","10001","01110"],"9":["01110","10001","10001","01111","00001","00001","01110"]," ":["00000","00000","00000","00000","00000","00000","00000"],"!":["00100","00100","00100","00100","00100","00000","00100"],"+":["00000","00100","00100","11111","00100","00100","00000"],":":["00000","00100","00000","00000","00100","00000","00000"],".":["00000","00000","00000","00000","00000","00000","00100"],"/":["00001","00010","00010","00100","01000","01000","10000"],"-":["00000","00000","00000","11111","00000","00000","00000"],"=":["00000","00000","11111","00000","11111","00000","00000"],"'":["00100","00100","01000","00000","00000","00000","00000"],"*":["00000","10101","01110","11111","01110","10101","00000"]};
  function textW(s,sc,sp=1){return s.length*5*sc+(s.length-1)*sp*sc;}
  function drawText(s,x,y,sc,col,sp=1){let cx=x;for(const chR of s){const ch=chR.toUpperCase(),g=FONT[ch]||FONT[" "],c=(typeof col==="function")?col(chR,cx):col;for(let r=0;r<7;r++){const row=g[r];for(let cc=0;cc<5;cc++)if(row[cc]==="1")rect(cx+cc*sc,y+r*sc,sc,sc,c);}cx+=5*sc+sp*sc;}return cx;}
  function drawTextC(s,cx,y,sc,col,sp=1){return drawText(s,Math.round(cx-textW(s,sc,sp)/2),y,sc,col,sp);}
  function drawTextS(s,cx,y,sc,col,shadow="#06222b",sp=1){drawTextC(s,cx+sc,y+sc,sc,shadow,sp);drawTextC(s,cx,y,sc,col,sp);}

  /* ===================== sprites ===================== */
  const S_hamster={rows:["....DDDD..DDDD....","...DLLDD..DDLLD...","..DLPGGDDDDGGPLD..","..DGGGGGGGGGGGGD..",".DGGGGGGGGGGGGGGD.",".DGGEGGGGGGGGEGGD.",".DGGEGGGNNGGGEGGD.",".DGWWGGGNNGGGWWGD.",".DGWWGGGGGGGGWWGD.",".DGGWWWWWWWWWWGGD.","..DGWWWWWWWWWWGD..","..DGGWWWWWWWWGGD..","...DGGWWWWWWGGD...","...DPGD....DGPD...","....DD......DD....","................."],pal:{D:"#5d636d",G:"#9aa0a8",L:"#c4c9cf",W:"#e9eef3",P:"#f4a6b8",E:"#1b1f24",N:"#f08aa6"}};
  const S_hat={rows:["....B....","...BWB...","...BTB...","..BWTWB..","..BTWTB..",".BWTWTWB.",".BTWTWTB.","BWTWTWTWB","BBBBBBBBB"],pal:{B:"#0d5f76",T:"#3de0c0",W:"#9bff5a"}};
  const S_cake={rows:["..FFFFFFFFFF..",".FCCCCCCCCCCF.",".FCdCdCdCdCCF.","FFFFFFFFFFFFFF","FBBBBBBBBBBBBF","FBdBBdBBdBBdBF","FBBBBBBBBBBBBF","FBBdBBdBBdBBBF","FFFFFFFFFFFFFF"],pal:{F:"#aee9ff",C:"#5ec8e8",d:"#ffd35a",B:"#2f93b8"}};
  const S_note={rows:["...11","...11","...11","...11","...11","...11",".1111","11111",".111."],pal:{"1":"#b98cff"}};
  const S_badge={rows:[".....BB.....","....BGGB....","...BGGGGB...","..BGG..GGB..",".BG......GB.","...........","....BGGB....","...BGGGGB...","..BGG..GGB..",".BGG....GGB.",".B........B."],pal:{B:"#6e4f0d",G:"#ffd35a"}};
  const S_rock={rows:["....KKKK....","..KKHHHHKK..",".KHHHHHHHHK.","KHHHHHHHHHHK","KHHGGGGGHHHK","KHGGGGGGGGHK",".KHHHHHHHHK.","..KKKKKKKK.."],pal:{K:"#333a42",H:"#5b636d",G:"#717a85"}};
  const S_log={rows:[".KKKKKKKKKKKKKKKK.","KrRRrrrrrrrrRRrrK","KrRRrrrrrrrrRRrrK","KrrrrrrrrrrrrrrrK","KrrrrrrrrrrrrrrrK","KrRRrrrrrrrrRRrrK",".KKKKKKKKKKKKKKKK."],pal:{K:"#3a2a18",r:"#6e4a2b",R:"#8a6038"}};
  const S_sandbag={rows:[".MMMMMMMMMMMM.","MMnMMMMMMMMnMM","MMMMcMMMMcMMMM","MMMMMMMMMMMMMM",".M.M.M.M.M.M.M","MMMMMMMMMMMMMM","MMnMMMcMMMMnMM","MMMMMMMMMMMMMM",".MMMMMMMMMMMM."],pal:{M:"#7d7440",n:"#5c5630",c:"#566b3a"}};
  const S_heart={rows:[".RR.RR.","RRRRRRR","RRRRRRR",".RRRRR.","..RRR..","...R..."],pal:{R:"#ff5a8a"}};

  /* ===================== enduro biker (transform-friendly) ===================== */
  function bikerBody(spin,airborne){
    const dark="#161e26",frame="#3de0c0",jersey="#9bff5a",skin="#f0c39b",helmet="#1f8fb0",tire="#0e141a",rim="#46525e";
    const R=8,rear=[-15,0],front=[15,0];
    [rear,front].forEach(([wx,wy])=>{
      circleFill(wx,wy,R,tire);ring(wx,wy,R,"#222d36");ring(wx,wy,R-3,rim);
      for(let a=0;a<6;a++){const ang=a*Math.PI/3+spin;line(wx,wy,wx+Math.cos(ang)*(R-3),wy+Math.sin(ang)*(R-3),"#39454f");}
      circleFill(wx,wy,2,"#5a6772");
      for(let a=0;a<12;a++){const ang=a*Math.PI/6+spin;px(wx+Math.cos(ang)*R,wy+Math.sin(ang)*R,"#05080b");}
    });
    const bb=[0,-2],seat=[-9,-15],bar=[12,-15],headTop=[11,-13];
    thickLine(rear[0],rear[1],bb[0],bb[1],frame);thickLine(rear[0],rear[1],seat[0],seat[1],frame);
    thickLine(seat[0],seat[1],bb[0],bb[1],frame);thickLine(bb[0],bb[1],headTop[0],headTop[1],frame);
    thickLine(seat[0],seat[1],bar[0],bar[1],frame);thickLine(front[0],front[1],headTop[0],headTop[1],"#2a3942");
    rect(seat[0]-3,seat[1]-1,6,2,dark);rect(bar[0]-1,bar[1]-1,4,2,dark);circleFill(bb[0],bb[1],2,"#2a3942");
    const hip=[-2,-17],shoulder=[6,-26],head=[10,-30],kneeY=airborne?-12:-9;
    thickLine(hip[0],hip[1],2,kneeY,dark);thickLine(2,kneeY,bb[0],bb[1],dark);
    thickLine(hip[0],hip[1],-1,kneeY,"#0f161c");thickLine(-1,kneeY,bb[0]-1,bb[1],"#0f161c");
    for(let i=0;i<2;i++)thickLine(hip[0]+i,hip[1],shoulder[0]+i,shoulder[1],jersey);
    line(hip[0]-1,hip[1],shoulder[0]-1,shoulder[1],"#5fbf2f");
    thickLine(shoulder[0],shoulder[1],bar[0],bar[1]-1,jersey);
    rect(bar[0]-1,bar[1]-2,3,3,dark);
    circleFill(head[0],head[1],3,skin);
    ctx.fillStyle=helmet;for(let a=-Math.PI*0.95;a<=0.15;a+=0.2)px(head[0]+Math.cos(a)*4,head[1]+Math.sin(a)*4,helmet);
    rect(head[0]-3,head[1]-4,8,2,helmet);rect(head[0]+3,head[1]-1,3,1,helmet);px(head[0]+2,head[1],"#241a14");
  }
  function drawBiker(cx,cy,spin,airborne,tilt,squash){
    ctx.save();
    ctx.translate(Math.round(cx),Math.round(cy));
    if(tilt) ctx.rotate(tilt);
    if(squash){const sx=1+0.22*squash,sy=1-0.22*squash;ctx.scale(sx,sy);}
    bikerBody(spin,airborne);
    ctx.restore();
  }

  /* ===================== background ===================== */
  const stars=Array.from({length:70},()=>({x:Math.random(),y:Math.random()*0.45,p:Math.random()*6.28,s:.4+Math.random()*.9}));
  const clouds=Array.from({length:4},(_,i)=>({x:Math.random(),y:0.20+Math.random()*0.18,s:0.7+Math.random()*0.8,spd:0.2+Math.random()*0.2}));
  const pmod=(a,b)=>((a%b)+b)%b;
  function mountainLayer(baseY,amp,period,phase,col,cap){
    for(let x=0;x<W;x++){const t=(x+phase)/period;const h=amp*(0.55+0.45*Math.sin(t)+0.18*Math.sin(t*2.3+1.5));const top=Math.round(baseY-h);rect(x,top,1,baseY-top,col);if(cap&&h>amp*0.85)px(x,top,"#dff1ff");}
  }
  function drawCloud(x,y,s){const c="#22415e";circleFill(x,y,3*s,c);circleFill(x+4*s,y+1,4*s,c);circleFill(x+9*s,y,3*s,c);circleFill(x+4*s,y-2,3*s,c);}
  function drawTent(x,y){for(let r=0;r<10;r++){const half=r;rect(x-half,y-10+r,half*2+1,1,"#3c4a2a");}rect(x-1,y-1,3,1,"#2a331d");line(x,y-10,x,y-16,"#888");rect(x,y-16,6,4,"#c9302c");px(x+2,y-15,"#fff");px(x+4,y-14,"#fff");}
  function drawWorld(scroll,t){
    [["#0a1430",0,.14],["#0e2142",.14,.26],["#123a5e",.26,.40],["#185f72",.40,.58],["#1f8a86",.58,.74]].forEach(([c,a,b])=>rect(0,H*a,W,H*(b-a)+1,c));
    stars.forEach(s=>{const tw=.5+.5*Math.sin(t*2*s.s+s.p);if(tw>.5)px(s.x*W,s.y*H,tw>.85?"#fff":"#bcdcff");});
    circleFill(W-44,30,9,"#eaf6ff");circleFill(W-48,27,9,"#185f72");
    clouds.forEach(c=>{const x=pmod(c.x*W - scroll*c.spd, W+40)-20;drawCloud(x,c.y*H,c.s);});
    const gy=H-34;
    mountainLayer(gy-18,34,70,scroll*0.15,"#274a72",true);
    mountainLayer(gy-8,26,54,scroll*0.32+40,"#1f6f5e",true);
    mountainLayer(gy+2,18,40,scroll*0.55+80,"#163f33",false);
    for(let i=0;i<6;i++){const tx=pmod(i*150-scroll*0.55,W+150)-75;if(tx>-20&&tx<W+20)drawTent(tx,gy-2);}
    rect(0,gy,W,H-gy,"#23303a");rect(0,gy,W,3,"#3a2c1c");rect(0,gy+3,W,2,"#6e4a2b");
    for(let x=0;x<W;x++){const wx=x+scroll;if((wx|0)%9===0)px(x,gy+6+((wx*7)%4),"#5a3b21");if((wx|0)%23===0){rect(x,gy+8,5,3,"#2f3a24");rect(x+1,gy+7,2,2,"#3d4a2c");}}
    return gy;
  }

  /* ===================== particles ===================== */
  const dust=[],sparks=[],fw=[],pops=[];
  function addDust(x,y,n=1){for(let i=0;i<n;i++)dust.push({x,y,vx:-20-Math.random()*40,vy:-10-Math.random()*26,life:0,max:16+Math.random()*10});}
  function addSpark(x,y,col){for(let i=0;i<10;i++)sparks.push({x,y,vx:(Math.random()-.5)*90,vy:-Math.random()*90-10,life:0,max:18,c:col});}
  function addFirework(x,y){const cols=["#3de0c0","#9bff5a","#5ad1ff","#b98cff","#ffd35a","#ff5a8a","#fff"];const c=cols[(Math.random()*cols.length)|0];for(let i=0;i<26;i++){const a=i/26*6.28,sp=30+Math.random()*45;fw.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0,max:42,c});}}
  function addPop(x,y,txt,col){pops.push({x,y,txt,col,life:0,max:55});}
  function updParticles(dt){
    for(let i=dust.length-1;i>=0;i--){const p=dust[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=50*dt;p.life++;if(p.life>p.max){dust.splice(i,1);continue;}px(p.x,p.y,p.life<p.max*.5?"#9a8a72":"#6f6354");}
    for(let i=sparks.length-1;i>=0;i--){const p=sparks[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=140*dt;p.life++;if(p.life>p.max){sparks.splice(i,1);continue;}px(p.x,p.y,p.c);px(p.x+1,p.y,p.c);}
    for(let i=fw.length-1;i>=0;i--){const p=fw[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=32*dt;p.life++;if(p.life>p.max){fw.splice(i,1);continue;}px(p.x,p.y,p.life>p.max*.7?"#fff":p.c);}
    for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.life++;p.y-=18*dt;if(p.life>p.max){pops.splice(i,1);continue;}const blink=p.life>p.max-10&&(p.life%2);if(!blink)drawTextC(p.txt,p.x,p.y,1,p.col);}
  }

  /* ===================== audio ===================== */
  let AC=null, muted=false;
  try{muted=localStorage.getItem("ella_muted")==="1";}catch(e){}
  function ac(){if(muted)return null;if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==="suspended")AC.resume();return AC;}
  function beep(f,d,type="square",vol=.12,slide=0){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.setValueAtTime(f,a.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),a.currentTime+d);g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(vol,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+d+.02);}
  const sfxJump=()=>beep(420,.16,"square",.10,720);
  const sfxJump2=()=>beep(640,.16,"square",.10,920);
  const sfxCoin=()=>{beep(880,.08,"square",.10);setTimeout(()=>beep(1180,.10,"square",.10),70);};
  const sfxBadge=()=>{beep(700,.09,"triangle",.12);setTimeout(()=>beep(900,.09,"triangle",.12),90);setTimeout(()=>beep(1240,.16,"triangle",.12),180);};
  const sfxCrash=()=>{beep(200,.32,"sawtooth",.14,60);};
  function playTune(){const a=ac();if(!a)return;const mel=[[392,.3],[392,.15],[440,.45],[392,.45],[523,.45],[494,.7],[392,.3],[392,.15],[440,.45],[392,.45],[587,.45],[523,.7],[392,.3],[392,.15],[784,.45],[659,.45],[523,.45],[494,.45],[440,.7],[698,.3],[698,.15],[659,.45],[523,.45],[587,.45],[523,.9]];let tm=a.currentTime+.05;mel.forEach(([f,d])=>{const o=a.createOscillator(),g=a.createGain();o.type="triangle";o.frequency.value=f;g.gain.setValueAtTime(.0001,tm);g.gain.exponentialRampToValueAtTime(.14,tm+.03);g.gain.exponentialRampToValueAtTime(.0001,tm+d*.95);o.connect(g).connect(a.destination);o.start(tm);o.stop(tm+d);tm+=d;});}

  /* ===================== game state ===================== */
  const RANKS=["RECRUIT","CADET","LANCE CPL","CORPORAL","SERGEANT","BIRTHDAY CADET"];
  const rankFor=b=>RANKS[Math.min(5,Math.floor(b/3))];
  let best=0; try{best=parseInt(localStorage.getItem("ella_best")||"0")||0;}catch(e){}

  const JUMP=330, G=900, BUFFER=0.13;
  const game={state:"title",scroll:0,speed:135,t:0,score:0,badges:0,lives:3,inv:0,
    hintT:3.5,celebrated:false,celebrateT:0,spawnT:1.1,sinceObs:9,shake:0,paused:false,
    player:{y:0,vy:0,onGround:true,airJumps:1,buffer:0,squash:0},entities:[]};
  const groundLevel=()=>H-34;
  const bikeRestY=()=>groundLevel()-8;

  function resetGame(){
    game.state="play";game.scroll=0;game.speed=135;game.t=0;game.score=0;game.badges=0;
    game.lives=3;game.inv=0;game.hintT=3.0;game.celebrated=false;game.celebrateT=0;
    game.spawnT=0.9;game.sinceObs=9;game.shake=0;game.paused=false;
    game.entities.length=0;dust.length=0;sparks.length=0;fw.length=0;pops.length=0;
    const p=game.player;p.y=bikeRestY();p.vy=0;p.onGround=true;p.airJumps=1;p.buffer=0;p.squash=0;
  }

  function requestJump(){game.player.buffer=BUFFER;}
  function cutJump(){const p=game.player;if(p.vy<0)p.vy*=0.45;}

  /* spawn tables */
  const OBST=[{s:S_rock,w:14,h:8,sc:2},{s:S_log,w:17,h:7,sc:2},{s:S_sandbag,w:13,h:9,sc:2}];
  function spawn(){
    const gy=groundLevel(), baseX=W+20;
    let makeObs = Math.random()<0.55 && game.sinceObs>0.78;
    if(makeObs){
      const o=OBST[(Math.random()*OBST.length)|0];const w=o.w*o.sc,h=o.h*o.sc;
      game.entities.push({kind:"obs",spr:o.s,sc:o.sc,x:baseX,y:gy-h,w,h});
      game.sinceObs=0;
    }else{
      const high=Math.random()<0.55;
      const cy=high?gy-56-Math.random()*20:gy-26;
      const cr=Math.random();let type,spr,sc,w,h,val,bad=false,big=false;
      if(cr<0.42){type="badge";spr=S_badge;sc=2;w=24;h=22;val=15;bad=true;}
      else if(cr<0.64){type="note";spr=S_note;sc=2;w=10;h=18;val=5;}
      else if(cr<0.88){type="cake";spr=S_cake;sc=2;w=28;h=18;val=8;}
      else {type="ham";spr=S_hamster;sc=2;w=32;h=32;val=25;big=true;}
      game.entities.push({kind:"col",type,spr,sc,x:baseX,y:big?cy-12:cy,w,h,val,bad,collected:false,bob:Math.random()*6.28});
    }
  }
  const playerBox=()=>{const p=game.player;return{x:80-15,y:p.y-25,w:30,h:33};};
  const overlap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;

  /* ===================== update ===================== */
  function update(dt){
    if(game.state!=="play"||game.paused){game.t+=dt;if(game.state==="celebrate")game.celebrateT+=dt;return;}
    game.t+=dt;
    game.speed=Math.min(300,135+game.scroll*0.012+game.t*1.4);
    game.scroll+=game.speed*dt;
    game.sinceObs+=dt;
    game.score+=game.speed*dt*0.06;
    if(game.hintT>0)game.hintT-=dt;
    if(game.inv>0)game.inv-=dt;
    if(game.shake>0)game.shake=Math.max(0,game.shake-dt*3);

    if(window.__autopilot){const p=game.player;let near=null;for(const e of game.entities){if(e.kind==="obs"&&e.x>72){if(!near||e.x<near.x)near=e;}}if(near&&near.x-80<60&&p.onGround)requestJump();}

    // physics + buffered jump
    const p=game.player;
    if(p.buffer>0){
      if(p.onGround){p.vy=-JUMP;p.onGround=false;p.airJumps=1;p.buffer=0;sfxJump();addDust(70,bikeRestY()+6,5);}
      else if(p.airJumps>0){p.vy=-JUMP*0.85;p.airJumps--;p.buffer=0;sfxJump2();addSpark(80,p.y+6,"#9bff5a");}
      else p.buffer-=dt;
    }
    p.vy+=G*dt;p.y+=p.vy*dt;
    const rest=bikeRestY();
    if(p.y>=rest){if(!p.onGround){p.onGround=true;p.airJumps=1;p.squash=1;addDust(70,rest+6,4);}p.y=rest;p.vy=0;}
    if(p.squash>0)p.squash=Math.max(0,p.squash-dt*6);
    if(p.onGround&&(game.scroll|0)%7===0)addDust(64,rest+6);

    // spawn
    game.spawnT-=dt;
    if(game.spawnT<=0){spawn();const base=Math.max(0.62,1.05-game.t*0.0035);game.spawnT=base+Math.random()*0.5;}

    // entities
    const box=playerBox();
    for(let i=game.entities.length-1;i>=0;i--){
      const e=game.entities[i];e.x-=game.speed*dt;
      if(e.x+e.w<-30){game.entities.splice(i,1);continue;}
      if(e.kind==="obs"){
        if(game.inv<=0&&overlap(box,{x:e.x+3,y:e.y+2,w:e.w-6,h:e.h-2})){
          game.lives--;game.inv=1.3;game.shake=1;p.vy=-200;sfxCrash();addSpark(80,p.y,"#ff5a8a");
          if(game.lives<=0){game.state="over";const fs=Math.floor(game.score);if(fs>best){best=fs;try{localStorage.setItem("ella_best",String(best));}catch(e){}}}
        }
      }else if(!e.collected&&overlap(box,{x:e.x,y:e.y,w:e.w,h:e.h})){
        e.collected=true;const cx=e.x+e.w/2,cy=e.y;
        if(e.bad){game.badges++;game.score+=15;sfxBadge();addSpark(cx,cy,"#ffd35a");addPop(cx,cy,"BADGE!","#ffd35a");
          if(game.badges>=15&&!game.celebrated){game.celebrated=true;game.state="celebrate";game.celebrateT=0;const fs=Math.floor(game.score);if(fs>best){best=fs;try{localStorage.setItem("ella_best",String(best));}catch(e){}}playTune();}
        }else{game.score+=e.val;sfxCoin();addSpark(cx,cy,e.type==="ham"?"#e9eef3":"#b98cff");addPop(cx,cy,"+"+e.val,e.type==="ham"?"#e9eef3":"#9bff5a");}
        game.entities.splice(i,1);
      }
    }
  }

  /* ===================== HUD + screens ===================== */
  function hudPanel(){const a=ctx.globalAlpha;ctx.globalAlpha=0.32;rect(0,0,W,30,"#06121e");ctx.globalAlpha=0.16;rect(0,30,W,4,"#06121e");ctx.globalAlpha=a;}
  function drawHUD(){
    hudPanel();
    drawText("SCORE "+Math.floor(game.score),4,3,1,"#eaf6ff");
    for(let i=0;i<game.lives;i++)sprite(S_heart.rows,S_heart.pal,4+i*9,12,1);
    const bt="BADGES "+game.badges+"/15  "+rankFor(game.badges);
    drawText(bt,4,22,1,"#ffd35a");
    if(best>0){const bs="BEST "+best;drawTextC(bs,W/2,3,1,"#7fd6c6");}
  }
  function bikerTilt(){const p=game.player;return p.onGround?0:Math.max(-0.32,Math.min(0.28,-p.vy*0.0006));}

  function drawTitle(){
    const gy=drawWorld(game.t*30,game.t);
    drawBiker(80,bikeRestY(),0,false,0,0);
    sprite(S_hamster.rows,S_hamster.pal,W-60,gy-26,2);sprite(S_hat.rows,S_hat.pal,W-50,gy-40,2);
    for(let i=0;i<3;i++){const x=W*0.5+i*26,y=70+Math.sin(game.t*1.5+i)*5;sprite(S_note.rows,S_note.pal,x,y,1);}
    drawTextS("HAPPY 15TH BIRTHDAY",W/2,6,1,"#bdf3ff");
    const word="ELLA",sc=Math.min(7,Math.floor(W/42)),sp=2;let cx=Math.round(W/2-textW(word,sc,sp)/2);
    const cols=["#3de0c0","#5ad1ff","#9bff5a","#b98cff"];
    for(let i=0;i<4;i++){const g=FONT[word[i]],bob=Math.round(Math.sin(game.t*3+i*.6)*2),by=16+bob;
      for(let r=0;r<7;r++)for(let c=0;c<5;c++)if(g[r][c]==="1"){rect(cx+c*sc+2,by+r*sc+2,sc,sc,"#05222b");rect(cx+c*sc,by+r*sc,sc,sc,cols[i]);if(r===0||g[r-1][c]==="0")rect(cx+c*sc,by+r*sc,sc,2,"#eafffb");}cx+=5*sc+sp*sc;}
    drawTextS("CADET ENDURO RIDE",W/2,70,2,"#9bff5a");
    if(Math.sin(game.t*4)>-0.3)drawTextS("TAP TO START!",W/2,92,2,"#ffd35a");
    drawTextC("TAP=JUMP   *   TAP AGAIN=DOUBLE JUMP",W/2,110,1,"#cfe8ff");
    drawTextC("COLLECT 15 CADET BADGES TO LEVEL UP",W/2,120,1,"#cfe8ff");
    if(best>0)drawTextC("BEST  "+best,W/2,130,1,"#7fd6c6");
  }
  function drawGame(){
    drawWorld(game.scroll,game.t);
    for(const e of game.entities){
      if(e.kind==="obs")sprite(e.spr.rows,e.spr.pal,e.x,e.y,e.sc);
      else{const by=e.y+Math.sin(game.t*3+e.bob)*2;sprite(e.spr.rows,e.spr.pal,e.x,by,e.sc);if(e.bad&&Math.sin(game.t*6)>0.3)px(e.x+e.w/2,by-2,"#fff");}
    }
    const flash=game.inv>0&&((game.inv*12)|0)%2===0;
    if(!flash)drawBiker(80,game.player.y,game.scroll*0.35,!game.player.onGround,bikerTilt(),game.player.squash);
    drawHUD();
    if(game.hintT>0&&Math.sin(game.t*6)>-0.5)drawTextC("TAP TO JUMP!",W/2,H-72,2,"#ffffff");
  }
  function dim(al){const a=ctx.globalAlpha;ctx.globalAlpha=al;rect(0,0,W,H,"#06101c");ctx.globalAlpha=a;}
  function drawOver(){
    drawWorld(game.scroll,game.t);drawBiker(80,bikeRestY(),0,false,0,0);dim(0.45);
    drawTextS("CRASHED!",W/2,H/2-40,3,"#ff5a8a");
    drawTextC("SCORE "+Math.floor(game.score)+"     BADGES "+game.badges,W/2,H/2-2,1,"#eaf6ff");
    drawTextC("RANK  "+rankFor(game.badges),W/2,H/2+8,1,"#9bff5a");
    drawTextC("BEST  "+best,W/2,H/2+18,1,"#ffd35a");
    if(Math.sin(game.t*4)>-0.3)drawTextS("TAP TO RIDE AGAIN",W/2,H/2+32,2,"#9bff5a");
  }
  function drawCelebrate(){
    drawWorld(game.scroll,game.t);
    drawBiker(80,bikeRestY(),game.scroll*0.35,false,0,0);
    sprite(S_hamster.rows,S_hamster.pal,W-60,groundLevel()-26,2);sprite(S_hat.rows,S_hat.pal,W-50,groundLevel()-40,2);
    if(game.celebrateT<6&&Math.random()<0.28)addFirework(20+Math.random()*(W-40),20+Math.random()*70);
    dim(0.30);
    drawTextS("HAPPY 15TH",W/2,18,3,"#ffd35a");
    drawTextS("BIRTHDAY ELLA!",W/2,46,3,"#3de0c0");
    drawTextC("15 CADET BADGES  -  BIRTHDAY CADET!",W/2,80,1,"#9bff5a");
    drawTextC("RIDE FAST  *  STAY 15 FOREVER  *  ATTEN-SHUN!",W/2,92,1,"#cfe8ff");
    if(game.celebrateT>1.4&&Math.sin(game.t*4)>-0.3)drawTextS("TAP TO KEEP RIDING",W/2,H-40,2,"#ffffff");
  }
  function drawPaused(){drawTextS("PAUSED",W/2,H/2-16,3,"#bdf3ff");drawTextS("TAP TO RESUME",W/2,H/2+12,1,"#9fc7dd");}

  /* ===================== loop ===================== */
  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;if(dt<0)dt=0;

    if(window.__forceState&&!window.__fsDone){window.__fsDone=true;resetGame();game.state=window.__forceState;if(game.state==="celebrate"){game.badges=15;game.score=420;game.celebrateT=2;}if(game.state==="over"){game.score=372;game.badges=8;}}
    if(window.__autopilot&&!window.__apReady){window.__apReady=true;resetGame();}

    update(dt);

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    let sxk=0,syk=0;
    if(game.shake>0&&!game.paused){sxk=(Math.random()-.5)*6*game.shake;syk=(Math.random()-.5)*6*game.shake;}
    ctx.setTransform(1,0,0,1,Math.round(sxk),Math.round(syk));

    if(game.state==="title")drawTitle();
    else if(game.state==="play")drawGame();
    else if(game.state==="over")drawOver();
    else if(game.state==="celebrate")drawCelebrate();
    if(!game.paused)updParticles(dt); else updParticles(0);
    if(game.paused&&game.state==="play")drawPaused();

    ctx.setTransform(1,0,0,1,0,0);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ===================== input ===================== */
  function onPress(){
    ac();
    if(game.paused){game.paused=false;pauseBtn.textContent="⏸";last=performance.now();return;}
    if(game.state==="title"||game.state==="over"){resetGame();return;}
    if(game.state==="celebrate"){game.state="play";last=performance.now();return;}
    requestJump();
  }
  canvas.addEventListener("pointerdown",e=>{e.preventDefault();onPress();},{passive:false});
  canvas.addEventListener("pointerup",e=>{e.preventDefault();if(game.state==="play")cutJump();},{passive:false});
  window.addEventListener("keydown",e=>{if(["Space","ArrowUp","KeyW"].includes(e.code)){e.preventDefault();onPress();}});
  window.addEventListener("keyup",e=>{if(["Space","ArrowUp","KeyW"].includes(e.code)&&game.state==="play")cutJump();});

  muteBtn.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();muted=!muted;muteBtn.textContent=muted?"🔇":"🔊";try{localStorage.setItem("ella_muted",muted?"1":"0");}catch(e){}});
  pauseBtn.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();if(game.state==="play"){game.paused=!game.paused;pauseBtn.textContent=game.paused?"▶":"⏸";if(!game.paused)last=performance.now();}});
  muteBtn.textContent=muted?"🔇":"🔊";

  document.addEventListener("visibilitychange",()=>{if(document.hidden&&game.state==="play")game.paused=true,pauseBtn.textContent="▶";});
  window.addEventListener("blur",()=>{if(game.state==="play"){game.paused=true;pauseBtn.textContent="▶";}});
  document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
  document.addEventListener("contextmenu",e=>e.preventDefault());
  document.addEventListener("gesturestart",e=>e.preventDefault());
})();
</script>
</body>
</html>
