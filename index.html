<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1b30" />
<title>Ella's Grand Prix — Birthday Kart!</title>
<meta name="description" content="A short Mario-Kart-style pixel-art kart racer for Ella's 15th birthday. Race 3 laps and get a happy birthday message. Playable in the browser on Android." />
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background:#070d1a; overflow:hidden;
    font-family: ui-monospace, "Courier New", monospace;
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  #game { display:block; image-rendering:pixelated; image-rendering:crisp-edges; background:#0b1b30; touch-action:none; }
  #ui { position:fixed; z-index:5; display:flex; gap:6px; top:calc(env(safe-area-inset-top,0px) + 6px); right:calc(env(safe-area-inset-right,0px) + 6px); }
  #ui button { width:36px; height:36px; padding:0; font-size:18px; line-height:36px; color:#cfe8ff; background:rgba(8,20,30,.55); border:1px solid rgba(61,224,192,.5); border-radius:9px; cursor:pointer; }
  #ui button:active { transform:translateY(1px); }
  #rotate { position:fixed; left:0; right:0; z-index:4; display:none; bottom:calc(env(safe-area-inset-bottom,0px) + 8px); color:#bdf3ff; pointer-events:none; text-align:center; font-size:13px; line-height:1.5; padding:6px; text-shadow:0 1px 2px #000; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"><button id="muteBtn" aria-label="Mute">🔊</button></div>
  <div id="rotate">📱 Turn your phone sideways (landscape) for the best race! 🏁</div>
<script>
(() => {
  "use strict";
  const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
  const muteBtn=document.getElementById("muteBtn"), rotateEl=document.getElementById("rotate");

  /* ---------- sizing ---------- */
  let W=420,H=210,frame=null;
  function resize(){
    const vw=window.innerWidth,vh=window.innerHeight; H=210;
    const portrait=vh>vw;
    if(portrait){W=420;rotateEl.style.display="block";} else {W=Math.max(340,Math.min(600,Math.round(H*(vw/vh))));rotateEl.style.display="none";}
    canvas.width=W;canvas.height=H;ctx.imageSmoothingEnabled=false;
    frame=ctx.createImageData(W,H);
    const aspect=W/H;let cw=vw,ch=vh;
    if(cw/ch>aspect)cw=Math.round(ch*aspect);else ch=Math.round(cw/aspect);
    canvas.style.width=cw+"px";canvas.style.height=ch+"px";
  }
  window.addEventListener("resize",resize);
  window.addEventListener("orientationchange",()=>setTimeout(resize,120));

  /* ---------- pixel helpers (overlays) ---------- */
  const rect=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);};
  function sprite(rows,pal,ox,oy,sc=1){for(let r=0;r<rows.length;r++){const row=rows[r];for(let i=0;i<row.length;i++){const c=pal[row[i]];if(c)rect(ox+i*sc,oy+r*sc,sc,sc,c);}}}
  const FONT={A:["01110","10001","10001","11111","10001","10001","10001"],B:["11110","10001","10001","11110","10001","10001","11110"],C:["01111","10000","10000","10000","10000","10000","01111"],D:["11110","10001","10001","10001","10001","10001","11110"],E:["11111","10000","10000","11110","10000","10000","11111"],F:["11111","10000","10000","11110","10000","10000","10000"],G:["01111","10000","10000","10111","10001","10001","01111"],H:["10001","10001","10001","11111","10001","10001","10001"],I:["11111","00100","00100","00100","00100","00100","11111"],J:["00111","00010","00010","00010","10010","10010","01100"],K:["10001","10010","10100","11000","10100","10010","10001"],L:["10000","10000","10000","10000","10000","10000","11111"],M:["10001","11011","10101","10101","10001","10001","10001"],N:["10001","11001","10101","10101","10011","10001","10001"],O:["01110","10001","10001","10001","10001","10001","01110"],P:["11110","10001","10001","11110","10000","10000","10000"],Q:["01110","10001","10001","10001","10101","10010","01101"],R:["11110","10001","10001","11110","10100","10010","10001"],S:["01111","10000","10000","01110","00001","00001","11110"],T:["11111","00100","00100","00100","00100","00100","00100"],U:["10001","10001","10001","10001","10001","10001","01110"],V:["10001","10001","10001","10001","10001","01010","00100"],W:["10001","10001","10001","10101","10101","11011","10001"],X:["10001","10001","01010","00100","01010","10001","10001"],Y:["10001","10001","01010","00100","00100","00100","00100"],Z:["11111","00001","00010","00100","01000","10000","11111"],"0":["01110","10001","10011","10101","11001","10001","01110"],"1":["00100","01100","00100","00100","00100","00100","01110"],"2":["01110","10001","00001","00110","01000","10000","11111"],"3":["11110","00001","00001","01110","00001","00001","11110"],"4":["00010","00110","01010","10010","11111","00010","00010"],"5":["11111","10000","11110","00001","00001","10001","01110"],"6":["01110","10000","10000","11110","10001","10001","01110"],"7":["11111","00001","00010","00100","01000","01000","01000"],"8":["01110","10001","10001","01110","10001","10001","01110"],"9":["01110","10001","10001","01111","00001","00001","01110"]," ":["00000","00000","00000","00000","00000","00000","00000"],"!":["00100","00100","00100","00100","00100","00000","00100"],":":["00000","00100","00000","00000","00100","00000","00000"],".":["00000","00000","00000","00000","00000","00000","00100"],"-":["00000","00000","00000","11111","00000","00000","00000"],"/":["00001","00010","00010","00100","01000","01000","10000"],"'":["00100","00100","01000","00000","00000","00000","00000"],"*":["00000","10101","01110","11111","01110","10101","00000"]};
  function textW(s,sc,sp=1){return s.length*5*sc+(s.length-1)*sp*sc;}
  function drawText(s,x,y,sc,col,sp=1){let cx=x;for(const chR of s){const ch=chR.toUpperCase(),g=FONT[ch]||FONT[" "];for(let r=0;r<7;r++){const row=g[r];for(let cc=0;cc<5;cc++)if(row[cc]==="1")rect(cx+cc*sc,y+r*sc,sc,sc,col);}cx+=5*sc+sp*sc;}return cx;}
  function drawTextC(s,cx,y,sc,col,sp=1){return drawText(s,Math.round(cx-textW(s,sc,sp)/2),y,sc,col,sp);}
  function drawTextS(s,cx,y,sc,col,shadow="#06222b",sp=1){drawTextC(s,cx+sc,y+sc,sc,shadow,sp);drawTextC(s,cx,y,sc,col,sp);}

  /* ---------- sprites ---------- */
  const S_kart={rows:[
    ".........HHHHHHHH.........",
    "........HHLLLLLLHH........",
    "........HLLLLLLLLH........",
    "........HLSSSSSSLH........",
    ".........SSSSSSSS.........",
    "......EEoTTTTTTTToEE......",
    ".....EoTTTTTTTTTTTToE.....",
    "..KK.EoTTTTTTTTTTTTToE.KK.",
    ".KKKKEoTTWWWWWWWWWWTToEKKKK",
    ".KRRKEoTTWYYYYYYYYWTToEKRRK",
    ".KRRKEoTTTTTTTTTTTTTToEKRRK",
    ".KKKKEEoTTTTTTTTTTTToEEKKKK",
    "..KK..EEEEEEEEEEEEEEEE..KK.",
    "........KK........KK......"],
    pal:{H:"#1f8fb0",L:"#9bff5a",S:"#f0c39b",E:"#0c2230",o:"#15806e",T:"#2bbfa6",W:"#eef6ff",Y:"#ffd35a",K:"#15181c",R:"#5a6772"}};
  const S_hamster={rows:["....DDDD..DDDD....","...DLLDD..DDLLD...","..DLPGGDDDDGGPLD..","..DGGGGGGGGGGGGD..",".DGGGGGGGGGGGGGGD.",".DGGEGGGGGGGGEGGD.",".DGGEGGGNNGGGEGGD.",".DGWWGGGNNGGGWWGD.",".DGWWGGGGGGGGWWGD.",".DGGWWWWWWWWWWGGD.","..DGWWWWWWWWWWGD..","..DGGWWWWWWWWGGD..","...DGGWWWWWWGGD...","...DPGD....DGPD...","....DD......DD....","................."],pal:{D:"#5d636d",G:"#9aa0a8",L:"#c4c9cf",W:"#e9eef3",P:"#f4a6b8",E:"#1b1f24",N:"#f08aa6"}};
  const S_hat={rows:["....B....","...BWB...","...BTB...","..BWTWB..","..BTWTB..",".BWTWTWB.",".BTWTWTB.","BWTWTWTWB","BBBBBBBBB"],pal:{B:"#0d5f76",T:"#3de0c0",W:"#9bff5a"}};

  /* ---------- track map ---------- */
  const MS=512, MASK=511;
  const mR=new Uint8Array(MS*MS), mG=new Uint8Array(MS*MS), mB=new Uint8Array(MS*MS), surf=new Uint8Array(MS*MS);
  let CL=[], CP=[];
  function setpx(x,y,r,g,b,s){if(x<0||y<0||x>=MS||y>=MS)return;const i=y*MS+x;mR[i]=r;mG[i]=g;mB[i]=b;if(s!==undefined)surf[i]=s;}
  function disc(cx,cy,r,fn){cx|=0;cy|=0;for(let y=-r;y<=r;y++){const yy=cy+y;if(yy<0||yy>=MS)continue;const xr=Math.sqrt(r*r-y*y)|0;for(let x=-xr;x<=xr;x++){const xx=cx+x;if(xx<0||xx>=MS)continue;fn(xx,yy);}}}
  function buildTrack(){
    // grass base with subtle noise
    for(let y=0;y<MS;y++)for(let x=0;x<MS;x++){const n=((x*7+y*13)%17)-8;setpx(x,y,38+n,108+n,52+(n>>1),0);}
    // checkerboard mowed pattern faint
    for(let y=0;y<MS;y++)for(let x=0;x<MS;x++){if(((x>>5)+(y>>5))&1){const i=y*MS+x;mG[i]=Math.min(255,mG[i]+8);}}
    // centerline loop
    const N=1400;CL=[];
    for(let i=0;i<N;i++){const t=i/N*Math.PI*2;
      const x=256+158*Math.cos(t)+38*Math.cos(2*t+0.6);
      const y=256+120*Math.sin(t)+30*Math.sin(3*t);
      CL.push({x,y,t});}
    const roadHalf=34;
    // rumble (outer) then tarmac (inner)
    for(let i=0;i<CL.length;i++){const p=CL[i];const par=(i%40)<20;
      disc(p.x,p.y,roadHalf+6,(x,y)=>{setpx(x,y,par?210:235,par?40:235,par?48:235,2);});
    }
    for(let i=0;i<CL.length;i++){const p=CL[i];
      disc(p.x,p.y,roadHalf,(x,y)=>{const n=((x*5+y*3)%11)-5;setpx(x,y,74+n,80+n,90+n,1);});
    }
    // faint centre dashes
    for(let i=0;i<CL.length;i+=22){const p=CL[i];disc(p.x,p.y,2,(x,y)=>setpx(x,y,210,210,90,1));}
    // finish line at CL[0]
    const a=CL[0],b=CL[8];let tx=b.x-a.x,ty=b.y-a.y;const tl=Math.hypot(tx,ty)||1;tx/=tl;ty/=tl;const nx=-ty,ny=tx;
    for(let d=-roadHalf;d<=roadHalf;d++)for(let w=-4;w<=4;w++){const x=(a.x+nx*d+tx*w)|0,y=(a.y+ny*d+ty*w)|0;const chk=(((d>>2)+(w>>2))&1);setpx(x,y,chk?245:20,chk?245:20,chk?245:20,3);}
    // checkpoints
    CP=[];const K=24;for(let k=0;k<K;k++)CP.push(CL[(k*CL.length/K)|0]);
    // infield decoration: trees + flowers on grass away from road
    function isGrass(x,y){x|=0;y|=0;if(x<0||y<0||x>=MS||y>=MS)return false;return surf[y*MS+x]===0;}
    let placed=0;for(let tries=0;tries<5000&&placed<260;tries++){const x=(Math.random()*MS)|0,y=(Math.random()*MS)|0;if(isGrass(x,y)&&isGrass(x+4,y)&&isGrass(x-4,y)&&isGrass(x,y+4)){disc(x,y,2+(Math.random()*2|0),(px,py)=>{if(surf[py*MS+px]===0)setpx(px,py,22,72,40);});if(Math.random()<0.3)setpx(x,y-2,255,90,140);placed++;}}
    // painted "ELLA 15" in the infield centre
    paintWord("ELLA",256-textW("ELLA",6,1)/2,210,6,[61,224,192]);
    paintWord("15",256-textW("15",6,1)/2,256,6,[255,211,90]);
    paintWord("HAPPY BIRTHDAY",256-textW("HAPPY BIRTHDAY",2,1)/2,300,2,[235,245,255]);
  }
  function paintWord(s,x,y,sc,rgb){x=Math.round(x);for(const chR of s){const ch=chR.toUpperCase(),g=FONT[ch]||FONT[" "];for(let r=0;r<7;r++)for(let c=0;c<5;c++)if(g[r][c]==="1")for(let yy=0;yy<sc;yy++)for(let xx=0;xx<sc;xx++){const px=x+c*sc+xx,py=y+r*sc+yy;if(px>=0&&py>=0&&px<MS&&py<MS&&surf[py*MS+px]===0)setpx(px,py,rgb[0],rgb[1],rgb[2]);}x+=5*sc+sc;}}

  /* ---------- Mode-7 ground render ---------- */
  const horizonFrac=0.42, FOCAL=170, CAMZ=24;
  const skyR=42,skyG=125,skyB=132; // horizon haze target
  function renderGround(camX,camY,camH){
    const data=frame.data, horizon=(H*horizonFrac)|0;
    const cosH=Math.cos(camH), sinH=Math.sin(camH);
    // sky
    for(let y=0;y<horizon;y++){
      const f=y/horizon;
      const r=(10+f*32)|0,g=(20+f*105)|0,b=(48+f*84)|0;
      let o=y*W*4;for(let x=0;x<W;x++){data[o]=r;data[o+1]=g;data[o+2]=b;data[o+3]=255;o+=4;}
    }
    // ground
    for(let y=horizon;y<H;y++){
      const dy=y-horizon+1;
      const z=(CAMZ*FOCAL)/dy;
      const cx=camX+cosH*z, cy=camY+sinH*z;
      const sx=-sinH*(z/FOCAL), sy=cosH*(z/FOCAL);
      let wx=cx-sx*(W/2), wy=cy-sy*(W/2);
      const fog=z>180?Math.min(0.82,(z-180)/520):0;
      const fr=1-fog;
      let o=y*W*4;
      for(let x=0;x<W;x++){
        const mx=(wx|0)&MASK, my=(wy|0)&MASK, i=my*MS+mx;
        data[o]=(mR[i]*fr+skyR*fog)|0;
        data[o+1]=(mG[i]*fr+skyG*fog)|0;
        data[o+2]=(mB[i]*fr+skyB*fog)|0;
        data[o+3]=255;
        wx+=sx;wy+=sy;o+=4;
      }
    }
    ctx.putImageData(frame,0,0);
  }

  /* ---------- audio ---------- */
  let AC=null,muted=false;try{muted=localStorage.getItem("ella_kart_mute")==="1";}catch(e){}
  function ac(){if(muted)return null;if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==="suspended")AC.resume();return AC;}
  function beep(f,d,type="square",vol=.1,slide=0){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.setValueAtTime(f,a.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),a.currentTime+d);g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(vol,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+d+.02);}
  const sfxBeep=()=>beep(520,.18,"square",.12);
  const sfxGo=()=>beep(880,.32,"square",.14);
  const sfxLap=()=>{beep(700,.1,"triangle",.12);setTimeout(()=>beep(1040,.16,"triangle",.12),100);};
  function playTune(){const a=ac();if(!a)return;const mel=[[392,.3],[392,.15],[440,.45],[392,.45],[523,.45],[494,.7],[392,.3],[392,.15],[440,.45],[392,.45],[587,.45],[523,.7],[392,.3],[392,.15],[784,.45],[659,.45],[523,.45],[494,.45],[440,.7],[698,.3],[698,.15],[659,.45],[523,.45],[587,.45],[523,.9]];let tm=a.currentTime+.05;mel.forEach(([f,d])=>{const o=a.createOscillator(),g=a.createGain();o.type="triangle";o.frequency.value=f;g.gain.setValueAtTime(.0001,tm);g.gain.exponentialRampToValueAtTime(.14,tm+.03);g.gain.exponentialRampToValueAtTime(.0001,tm+d*.95);o.connect(g).connect(a.destination);o.start(tm);o.stop(tm+d);tm+=d;});}

  /* ---------- game state ---------- */
  const LAPS=3;
  let best=0;try{best=parseFloat(localStorage.getItem("ella_kart_best")||"0")||0;}catch(e){}
  const fw=[];
  function addFirework(x,y){const cols=["#3de0c0","#9bff5a","#5ad1ff","#b98cff","#ffd35a","#ff5a8a","#fff"];const c=cols[(Math.random()*cols.length)|0];for(let i=0;i<24;i++){const a=i/24*6.28,sp=24+Math.random()*40;fw.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0,max:40,c});}}

  const kart={x:0,y:0,h:0,spd:0};
  const game={state:"title",t:0,raceTime:0,lap:0,nextCP:1,cdt:0,muted,shake:0,finishT:0};
  function startKart(){const a=CL[0],b=CL[10];kart.h=Math.atan2(b.y-a.y,b.x-a.x);kart.x=a.x;kart.y=a.y;kart.spd=0;}
  function startRace(){game.state="countdown";game.cdt=3.2;game.raceTime=0;game.lap=0;game.nextCP=1;game.shake=0;startKart();fw.length=0;sfxBeep();}

  const ON_MAX=178, OFF_MAX=66, ACC=150, TURN=2.5;
  function surfaceAt(x,y){const mx=(x|0)&MASK,my=(y|0)&MASK;return surf[my*MS+mx];}

  /* input: hold left/right side to steer */
  const ptrs=new Map();let keyL=false,keyR=false;
  function steerInput(){
    if(window.__demoAuto){const tg=CP[game.nextCP];let d=Math.atan2(tg.y-kart.y,tg.x-kart.x)-kart.h;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return d>0.05?1:d<-0.05?-1:0;}
    let l=keyL,r=keyR;for(const px of ptrs.values()){if(px<W*0.5)l=true;else r=true;}return (r?1:0)-(l?1:0);}

  function update(dt){
    game.t+=dt;
    for(let i=fw.length-1;i>=0;i--){const p=fw[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=30*dt;p.life++;if(p.life>p.max)fw.splice(i,1);}
    if(game.state==="countdown"){game.cdt-=dt;if(game.cdt<=0){game.state="race";sfxGo();}return;}
    if(game.state!=="race")return;
    game.raceTime+=dt;
    const s=surfaceAt(kart.x,kart.y);
    const offroad=(s===0);
    const max=offroad?OFF_MAX:ON_MAX;
    kart.spd+=ACC*dt;
    if(kart.spd>max)kart.spd=Math.max(max,kart.spd-300*dt);
    kart.spd-=kart.spd*0.6*dt; // drag
    if(kart.spd<0)kart.spd=0;
    const st=steerInput();
    kart.h+=st*TURN*dt*Math.min(1,kart.spd/90+0.25);
    kart.x+=Math.cos(kart.h)*kart.spd*dt;
    kart.y+=Math.sin(kart.h)*kart.spd*dt;
    game.shake=offroad&&kart.spd>30?0.6:Math.max(0,game.shake-dt*4);
    // checkpoints / laps
    const target=CP[game.nextCP];
    if(Math.hypot(kart.x-target.x,kart.y-target.y)<58){
      game.nextCP=(game.nextCP+1)%CP.length;
      if(game.nextCP===1){ // just passed the finish checkpoint (index 0)
        game.lap++;sfxLap();
        if(game.lap>=LAPS){
          game.state="finish";game.finishT=0;
          if(best===0||game.raceTime<best){best=game.raceTime;try{localStorage.setItem("ella_kart_best",String(best));}catch(e){}}
          playTune();
        }
      }
    }
  }

  /* ---------- draw ---------- */
  function fmtTime(t){const m=(t/60)|0,s=t-m*60;return m+":"+(s<10?"0":"")+s.toFixed(2);}
  function camFromKart(){const back=30;return [kart.x-Math.cos(kart.h)*back,kart.y-Math.sin(kart.h)*back,kart.h];}
  function drawKart(){
    const sc=2, sw=S_kart.rows[0].length*sc;
    const bob=Math.sin(game.t*14)*(kart.spd>20?1:0);
    const lean=steerInput();
    const baseX=Math.round(W/2-sw/2), baseY=Math.round(H-S_kart.rows.length*sc-6+bob);
    ctx.save();ctx.translate(Math.round(W/2),Math.round(baseY+S_kart.rows.length*sc));ctx.rotate(lean*0.06);
    sprite(S_kart.rows,S_kart.pal,Math.round(-sw/2),Math.round(-S_kart.rows.length*sc),sc);
    ctx.restore();
    // little party hat on the kart driver
    sprite(S_hat.rows,S_hat.pal,baseX+sw/2-9+lean*2,baseY-9,1);
  }
  function drawFW(){for(const p of fw){const c=p.life>p.max*.7?"#fff":p.c;rect(p.x,p.y,1,1,c);rect(p.x+1,p.y,1,1,c);}}
  function drawHUD(){
    rect(0,0,W,11,"#06121e");ctx.globalAlpha=1;
    drawText("LAP "+Math.min(game.lap+ (game.state==="finish"?0:1),LAPS)+"/"+LAPS,4,2,1,"#eaf6ff");
    drawTextC("TIME "+fmtTime(game.raceTime),W/2,2,1,"#9bff5a");
    if(best>0)drawText("BEST "+fmtTime(best),W-textW("BEST "+fmtTime(best),1)-4,2,1,"#ffd35a");
  }
  function drawSteerHints(){
    const a=Math.sin(game.t*4)>0?"#bdf3ff":"#7fb8cc";
    // left arrow
    drawTextC("<",W*0.12,H-16,2,steerInput()<0?"#9bff5a":a);
    drawTextC(">",W*0.88,H-16,2,steerInput()>0?"#9bff5a":a);
  }

  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;if(dt<0)dt=0;
    if(window.__demo&&!window.__demoInit){window.__demoInit=true;startRace();game.state="race";game.cdt=0;for(let i=0;i<(window.__demoSteps||220);i++)update(1/60);}
    update(dt);

    const [cx,cy,ch]=camFromKart();
    renderGround(cx,cy,ch);
    // screen shake
    let ox=0,oy=0;if(game.shake>0){ox=(Math.random()-.5)*4*game.shake;oy=(Math.random()-.5)*4*game.shake;}
    ctx.setTransform(1,0,0,1,Math.round(ox),Math.round(oy));

    drawKart();

    if(game.state==="title"){
      ctx.setTransform(1,0,0,1,0,0);
      drawTextS("ELLA'S GRAND PRIX",W/2,H*0.16,2,"#3de0c0");
      drawTextS("BIRTHDAY KART!",W/2,H*0.29,2,"#ffd35a");
      if(Math.sin(game.t*4)>-.3)drawTextS("TAP TO RACE!",W/2,H*0.46,2,"#9bff5a");
      drawTextS("HOLD LEFT / RIGHT OF SCREEN TO STEER",W/2,H*0.60,1,"#eaf6ff");
      drawTextS("3 LAPS   *   AUTO-ACCELERATE",W/2,H*0.67,1,"#eaf6ff");
    } else {
      drawHUD();drawSteerHints();drawFW();
    }
    if(game.state==="countdown"){
      const n=Math.ceil(game.cdt-0.2);
      const txt=n>=1?String(Math.min(3,n)):"GO!";
      drawTextS(txt,W/2,H/2-18,5,n>=1?"#ffd35a":"#9bff5a");
    }
    if(game.state==="finish"){
      game.finishT+=dt;
      if(game.finishT<7&&Math.random()<0.3)addFirework(20+Math.random()*(W-40),20+Math.random()*70);
      ctx.setTransform(1,0,0,1,0,0);
      rect(0,0,W,H,"#06101cbb");
      drawFW();
      drawTextS("HAPPY 15TH",W/2,H*0.12,3,"#ffd35a");
      drawTextS("BIRTHDAY ELLA!",W/2,H*0.30,3,"#3de0c0");
      drawTextC("LEVEL COMPLETE  -  YOU WON!",W/2,H*0.50,1,"#9bff5a");
      drawTextC("TIME  "+fmtTime(game.raceTime),W/2,H*0.58,1,"#eaf6ff");
      drawTextC("BEST  "+fmtTime(best),W/2,H*0.65,1,"#ffd35a");
      sprite(S_hamster.rows,S_hamster.pal,W/2-16,H*0.70,2);sprite(S_hat.rows,S_hat.pal,W/2-6,H*0.70-14,2);
      if(game.finishT>1.5&&Math.sin(game.t*4)>-.3)drawTextS("TAP TO RACE AGAIN",W/2,H-22,2,"#ffffff");
    }
    ctx.setTransform(1,0,0,1,0,0);
    requestAnimationFrame(loop);
  }

  /* ---------- input ---------- */
  function press(){ac();if(game.state==="title"||game.state==="finish"){startRace();}}
  canvas.addEventListener("pointerdown",e=>{e.preventDefault();ptrs.set(e.pointerId,e.clientX*(W/canvas.clientWidth));press();},{passive:false});
  canvas.addEventListener("pointermove",e=>{e.preventDefault();if(ptrs.has(e.pointerId))ptrs.set(e.pointerId,e.clientX*(W/canvas.clientWidth));},{passive:false});
  const clr=e=>{ptrs.delete(e.pointerId);};
  canvas.addEventListener("pointerup",e=>{e.preventDefault();clr(e);},{passive:false});
  canvas.addEventListener("pointercancel",clr);canvas.addEventListener("pointerout",clr);canvas.addEventListener("pointerleave",clr);
  window.addEventListener("keydown",e=>{if(e.code==="ArrowLeft"||e.code==="KeyA")keyL=true;if(e.code==="ArrowRight"||e.code==="KeyD")keyR=true;if(e.code==="Space"||e.code==="Enter"){e.preventDefault();press();}});
  window.addEventListener("keyup",e=>{if(e.code==="ArrowLeft"||e.code==="KeyA")keyL=false;if(e.code==="ArrowRight"||e.code==="KeyD")keyR=false;});
  muteBtn.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();muted=!muted;muteBtn.textContent=muted?"🔇":"🔊";try{localStorage.setItem("ella_kart_mute",muted?"1":"0");}catch(e){}});
  muteBtn.textContent=muted?"🔇":"🔊";
  document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
  document.addEventListener("contextmenu",e=>e.preventDefault());
  document.addEventListener("gesturestart",e=>e.preventDefault());

  /* ---------- boot ---------- */
  resize();buildTrack();startKart();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
